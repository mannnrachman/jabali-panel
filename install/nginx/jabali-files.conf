# -----------------------------------------------------------------
# FileBrowser (M11) — http-context helpers.
#
# The /files/ location blocks live in
#   install/nginx/includes/jabali-files.conf
# and are included from the default :443 server block (see
# install_nginx_default_vhost in install.sh). `location` is a
# server-context directive and cannot sit at the top level of
# /etc/nginx/conf.d/*.
# -----------------------------------------------------------------

# Map to detect missing ?token= query parameter. Used by the /files/
# bootstrap location to reject requests with no token without relying
# on conditional `if` inside the location.
map $arg_token $fb_token_empty {
    default 0;
    "" 1;
}
