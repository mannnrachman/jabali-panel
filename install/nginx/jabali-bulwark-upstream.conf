# Jabali Bulwark webmail upstream (M25 Step 5).
#
# Declares the jabali_bulwark upstream once at the http{} context level
# (Debian's /etc/nginx/conf.d/ pattern); the per-domain mail vhosts (each
# rendered from install/nginx/jabali-mail-vhost.conf.tmpl) and the in-Go
# template at panel-agent/internal/commands/webmail_vhost.go reference it
# by name in their `proxy_pass http://jabali_bulwark/;` directives.
#
# Form D (per pre-dispatch I2): swap unix↔TCP in one line without touching
# any proxy_pass directive. Rollback to TCP: change the `server` line to
# `server 127.0.0.1:3000;` and reload nginx; restart bulwark with
# Environment=HOSTNAME=127.0.0.1 PORT=3000 in the systemd unit.

upstream jabali_bulwark {
  server unix:/run/jabali-bulwark/bulwark.sock;
}
