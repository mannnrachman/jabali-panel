# Managed by jabali — ADR-0108 per-domain FastCGI micro-cache.
# DO NOT hand-edit; re-applied by install.sh + `jabali update`.
#
# ONE shared keyzone. Per-domain vhosts opt in with
# `fastcgi_cache jabali_fcgi;` (rendered by panel-agent domain.create
# only when the domain's cache_enabled is true). This http-context
# directive MUST be loaded before any vhost references the zone or
# `nginx -t` fails — that is why `jabali update` re-applies it (the
# "jabali update doesn't refresh host config" scar, PR#45/#49).
fastcgi_cache_path /var/cache/nginx/jabali levels=1:2 keys_zone=jabali_fcgi:64m max_size=4g inactive=60m use_temp_path=off;
