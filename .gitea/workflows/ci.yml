# Gitea Actions CI — gate every push + PR against the full test suite so the
# kind of silent baseline rot that slipped past M20 cutover can't recur.
#
# Three parallel jobs so feedback is fast: Go is the biggest, vitest is cheap,
# Playwright needs a built SPA + Chromium so it's the longest tail.
#
# Runner requirements:
#   - labels include `ubuntu-latest` (or the label(s) act_runner was registered with)
#   - `host` executor works fine; `docker` executor also OK if registered that way
#   - Go 1.24+ and Node 20+ either preinstalled or installable via actions/setup-*

name: CI

# CI runs ONLY on pull_request — push-to-main triggers were duplicating
# every PR's check (PR branch CI runs first + passes, then merge commit
# triggers a redundant rerun on main which Gitea then cancels when the
# next PR lands). The PR-branch run already proves the merge will be
# green; the redundant main-branch run cluttered the Actions page with
# orange cancelled icons that looked like failures.
on:
  pull_request:
    branches: [main]
  # Allow manual re-run from the Actions UI if needed for audit.
  workflow_dispatch:

# Concurrency group per ref keeps PR pushes from piling up stale in-flight
# jobs on the runner (push a new version, the old run auto-cancels). BUT
# on `main`, each commit is a permanent state we want an authoritative
# green/red record for — auto-cancelling means rapid-fire direct-pushes
# to main never complete CI. Gate cancel-in-progress to non-main refs so
# main runs always run to completion (they queue if pushes outrun runner
# throughput) and PR runs still auto-supersede.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  # Keep the Go + Node toolchains pinned so local `make test-all` and CI
  # run the same versions. Bump here to upgrade fleet-wide.
  GO_VERSION: "1.24"
  NODE_VERSION: "20"

jobs:
  go:
    name: Go tests + vet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          # cache: false (not true) on our host-mode act_runner:
          # setup-go's cache layer tars $GOMODCACHE on one run and
          # untars into the same path on the next. GitHub-hosted
          # runners wipe between jobs, so no conflict. Our host-mode
          # runner persists $GOMODCACHE across jobs (which is what we
          # want for speed), so setup-go's tar hits "File exists" on
          # every pre-existing module and the whole step cancels
          # (see run 70's ~20,000 line tar error log). The host's
          # persistent $GOMODCACHE already gives us the caching
          # benefit; setup-go's extra layer is redundant here.
          cache: false
      - name: go vet
        run: make vet
      - name: go test -race
        run: make test

  install-sh-lint:
    # Phantom-function detector for install.sh — guards against the
    # install_snuffleupagus / verify_socket_perms regression class
    # where a function gets removed from install.sh during a refactor
    # but the call site (in update.go or elsewhere in install.sh)
    # stays. Live-host crash with "command not found" mid-deploy
    # was the historical symptom; this gate makes it a PR failure.
    name: install.sh phantom-function lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run lint
        run: tools/lint-install-sh.sh

  ui-unit:
    name: panel-ui unit tests (vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: panel-ui/package-lock.json
      - name: Install deps
        run: cd panel-ui && npm ci --no-audit --no-fund
      # Lint is intentionally not wired in: panel-ui/package.json has an
      # eslint script but no eslint in devDependencies. Adding a real
      # lint gate is a separate chore (needs @typescript-eslint/* +
      # plugin-react + a config) — don't pretend we have it.
      - name: vitest
        run: cd panel-ui && npm test

  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    # Serialize e2e across ALL refs, not just the same ref. Port 4173 is
    # a host-level resource on the single-runner host-mode setup, so a
    # PR run (refs/pull/N/head) and a main push run (refs/heads/main) — in
    # different top-level concurrency groups — can both pass their own
    # "Free port 4173" cleanup step, then race to bind 4173, and one
    # loses with EADDRINUSE. Pinning every e2e job to a shared group makes
    # them queue instead of race. cancel-in-progress: false preserves the
    # authoritative green/red history on main and lets PR runs finish.
    concurrency:
      group: e2e-port-4173
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: panel-ui/package-lock.json
      - name: Install deps
        run: cd panel-ui && npm ci --no-audit --no-fund
      - name: Install Playwright Chromium
        run: cd panel-ui && npx playwright install --with-deps chromium
      - name: Build SPA
        run: cd panel-ui && npm run build
      # Host-mode runners don't get a fresh netns per job, so a stuck
      # vite-preview from a previous run can hold 4173. Playwright's
      # webServer is configured with --strictPort (see playwright.config.ts)
      # so any leftover fails the test loudly instead of picking 4174.
      # Kill any prior vite-preview first; procps is always preinstalled
      # so pkill is available (unlike fuser/lsof which are optional).
      # ss is part of iproute2, also always present; we use it to verify
      # the port is actually free after the kill so we don't race.
      - name: Free port 4173
        run: |
          echo "=== processes matching 'vite preview' ==="
          pgrep -a -f "vite preview" || echo "(none)"
          echo "=== listeners on :4173 before ==="
          ss -tln | awk 'NR==1 || /:4173 /' || true
          pkill -9 -f "vite preview" 2>/dev/null || true
          # Wait up to 10s for the port to actually free (kernel TIME_WAIT
          # is a SO_REUSEADDR concern, but vite-preview uses fresh sockets
          # so kill → free is near-instant).
          for i in $(seq 1 10); do
            ss -tln | grep -q ":4173 " || break
            sleep 1
          done
          echo "=== listeners on :4173 after ==="
          ss -tln | awk 'NR==1 || /:4173 /' || true
          if ss -tln | grep -q ":4173 "; then
            echo "ERROR: port 4173 still in use after kill + 10s wait"
            exit 1
          fi
      - name: Playwright
        run: cd panel-ui && npx playwright test --project=chromium --reporter=list
      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@v3
        with:
          name: playwright-report
          path: |
            panel-ui/test-results/
            panel-ui/playwright-report/
          retention-days: 7
