# Jabali Panel — SFTP access for users in the jabali-sftp group.
# Installed by: /etc/ssh/sshd_config.d/jabali-sftp.conf
# Source: install/ssh/jabali-sftp.conf (do not edit in place)

Match Group jabali-sftp
    # Enforce SFTP-only. No shell sessions for members of this group.
    ForceCommand internal-sftp

    # Disallow every non-file-transfer feature.
    AllowTcpForwarding no
    X11Forwarding no
    PermitTunnel no
    AllowAgentForwarding no

    # Lock user inside their own home. sshd refuses to chroot to a path
    # that isn't fully root-owned with non-group/world-write perms, so the
    # panel-agent flips /home/<user> to root:<user> 0751 (via ssh.user.home_chown
    # mode=sftp) before adding the user to the jabali-sftp group. Subdirs
    # (domains/, Maildir, dotfiles) stay user-owned and writable.
    ChrootDirectory /home/%u

    # Key-only auth. Panel never stores passwords; users upload their pubkey.
    PasswordAuthentication no
    KbdInteractiveAuthentication no
    PermitEmptyPasswords no

    # Log session activity with INFO — tells us who connected without per-file spam.
    ClientAliveInterval 300
    ClientAliveCountMax 2
