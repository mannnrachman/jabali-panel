# -----------------------------------------------------------------
# FileBrowser (M11) — SSO-gated per-user file manager.
# Included from the default :443 server block.
#
# Session model (Option B from plans/m11-filebrowser-session-fix.md):
#   1. Panel user clicks "Files" -> POST /api/v1/sso/filebrowser mints a
#      session-lived token (2h TTL, revocable via used_at).
#   2. Browser GET /files/?token=<t>:
#      - nginx validates the URL token via auth_request /internal/fb-validate
#      - sets the cookie jabali_fb_session=<t>; Path=/files; HttpOnly; Secure
#      - injects X-Forwarded-User from the validate response
#      - proxies to filebrowser
#   3. Subsequent /files/... requests carry the cookie instead of the URL
#      token. The same auth_request reruns; the same X-Forwarded-User is
#      injected. Filebrowser's auth.method=proxy is stateless: the header
#      MUST be present on every request, and the cookie carries the
#      session identity because filebrowser itself does not maintain one.
#
# Security invariants:
#   - Client-supplied X-Forwarded-User is ALWAYS overwritten by nginx from
#     the auth_request response; the browser cannot inject its own.
#   - Tokens are scoped to this panel (DB lookup); a stolen cookie grants
#     access until expires_at (2h) or an admin sets used_at (revocation).
#   - Cookie has HttpOnly, Secure, SameSite=Lax and Path=/files so it
#     cannot leak outside the file manager context or via JS.
# -----------------------------------------------------------------

# Bootstrap: first hit with a URL token. Validate, inject session cookie,
# proxy to filebrowser.
location = /files/ {
    if ($fb_session_token = "") {
        return 401;
    }

    auth_request /internal/fb-validate;
    auth_request_set $fb_user $upstream_http_x_auth_user;

    proxy_set_header X-Forwarded-User $fb_user;

    # Issue/refresh the session cookie. `always` so nginx sets it even on
    # non-2xx responses. The browser replaces it on every bootstrap visit
    # (harmless when already set).
    add_header Set-Cookie "jabali_fb_session=$fb_session_token; Path=/files; HttpOnly; Secure; SameSite=Lax; Max-Age=7200" always;

    proxy_pass http://unix:/run/jabali-filebrowser/fb.sock:/;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_http_version 1.1;
    proxy_set_header Connection "";

    # Allow the panel to embed /files/ in an iframe.
    proxy_hide_header X-Frame-Options;
    proxy_hide_header Content-Security-Policy;
}

# Catch-all: subsequent requests that ride the cookie. No URL token.
# auth_request revalidates the cookie on every hit; filebrowser requires
# X-Forwarded-User on every request under auth.method=proxy.
location /files/ {
    if ($fb_session_token = "") {
        return 401;
    }

    auth_request /internal/fb-validate;
    auth_request_set $fb_user $upstream_http_x_auth_user;

    proxy_set_header X-Forwarded-User $fb_user;

    proxy_pass http://unix:/run/jabali-filebrowser/fb.sock:/;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_http_version 1.1;
    proxy_set_header Connection "";

    # Large uploads.
    client_max_body_size 4G;
    proxy_request_buffering off;

    # WebSocket support.
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    proxy_hide_header X-Frame-Options;
    proxy_hide_header Content-Security-Policy;
}

# Internal subrequest handler. NOT reachable externally.
# $fb_session_token is resolved in the http-context map
# (install/nginx/jabali-files.conf): prefers URL token, falls back to
# the session cookie.
location = /internal/fb-validate {
    internal;
    proxy_method POST;
    proxy_pass_request_body off;
    proxy_set_header Content-Length "";
    proxy_pass http://unix:/run/jabali-panel/sso.sock:/sso/filebrowser/validate?token=$fb_session_token;
}
