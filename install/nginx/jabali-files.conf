# -----------------------------------------------------------------
# FileBrowser (M11) — SSO-gated per-user file manager
#
# Access flow:
#   1. Panel user clicks "Files" → POST /api/v1/sso/filebrowser → redirect URL.
#   2. Browser GET /files/?token=<t> → nginx subrequest to /internal/fb-validate.
#   3. If subrequest 200, nginx injects X-Forwarded-User from the response header
#      and proxies to the filebrowser UDS. Inbound X-Forwarded-User headers
#      from the client are ALWAYS stripped, no exceptions.
#   4. Subsequent requests carry a filebrowser cookie; nginx still validates
#      by always stripping inbound X-Forwarded-User on every request.
#
# Security invariants:
#   - Client-supplied X-Forwarded-User is ALWAYS stripped before proxy_pass.
#   - Token is one-time-use (panel enforces), so the query-param flow only
#     establishes the initial session. Replay fails.
# -----------------------------------------------------------------

# Map directive to check for missing token (avoids the "if is evil" antipattern)
map $arg_token $fb_token_empty {
    default 0;
    "" 1;
}

# The one-shot bootstrap: consume the token and set X-Forwarded-User.
location = /files/ {
    # Allow query-param token only on the entry URL; reject if missing.
    # The client should go through /api/v1/sso/filebrowser to get a token.
    if ($fb_token_empty = 1) {
        return 403;
    }

    # Subrequest to validate the token. The subrequest MUST be the ONLY
    # source of X-Forwarded-User; we discard anything the client sent.
    auth_request /internal/fb-validate;
    auth_request_set $fb_user $upstream_http_x_auth_user;

    # Strip any inbound X-Forwarded-User so a client can't spoof it.
    # Replace with the subrequest-validated username.
    proxy_set_header X-Forwarded-User $fb_user;

    proxy_pass http://unix:/run/jabali-filebrowser/filebrowser.sock:/;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
}

# All subsequent paths under /files/ — filebrowser's own cookie keeps the
# session; we just proxy. Nginx still strips inbound X-Forwarded-User on
# every request (we never trust the client with that header).
location /files/ {
    # Always strip client-supplied X-Forwarded-User to prevent spoofing.
    # The filebrowser application itself verifies the session via its cookies;
    # X-Forwarded-User is only for initial auth during the entry request.
    proxy_set_header X-Forwarded-User "";

    proxy_pass http://unix:/run/jabali-filebrowser/filebrowser.sock:/;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_http_version 1.1;
    proxy_set_header Connection "";

    # Filebrowser needs large uploads.
    client_max_body_size 4G;
    proxy_request_buffering off;

    # WebSocket support (filebrowser uses it for uploads/downloads progress).
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
}

# Internal subrequest handler — NOT reachable externally.
location = /internal/fb-validate {
    internal;
    proxy_method POST;
    proxy_set_header Content-Type "application/json";
    # Build a JSON body that carries the token from $arg_token.
    proxy_set_body "{\"token\":\"$arg_token\"}";
    proxy_pass_request_body off;
    proxy_pass http://unix:/run/jabali-panel/sso.sock:/sso/filebrowser/validate;

    # Expose the validator's X-Auth-User response header to auth_request_set.
    # The panel validator returns {"user":"..."} in the body AND repeats it
    # as X-Auth-User header for nginx-subrequest consumption.
}
