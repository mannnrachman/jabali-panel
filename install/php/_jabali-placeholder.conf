; Placeholder pool installed by install.sh so php-fpm can start on a
; fresh host with no hosting users yet. FPM refuses to boot with an
; empty pool.d — this no-op pool keeps the service green.
;
; It runs as www-data, listens on a loopback-only socket nothing
; actually connects to, and caps at one ondemand worker with a 10s
; idle timeout (worker spawns only if something hits the socket; in
; practice: never).
;
; Safe to leave in place. Becomes moot once the slices plan's step 6
; masks the global php<v>-fpm.service in favor of per-user masters
; (jabali-fpm@<user>.service), which only start when their specific
; pool config exists and never look at pool.d/.

[_jabali_placeholder]
user = www-data
group = www-data
listen = /run/php/php-fpm-jabali-placeholder.sock
listen.owner = www-data
listen.group = www-data
listen.mode = 0600
pm = ondemand
pm.max_children = 1
pm.process_idle_timeout = 10s
