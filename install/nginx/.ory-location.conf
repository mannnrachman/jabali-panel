# Ory Kratos reverse proxy — self-service endpoints (M20)
# Proxies /.ory/* to Kratos on loopback port 4433.
# Strips the /.ory/ prefix so Kratos receives requests at its root.
#
# Include this snippet in the main panel vhost nginx config:
#   include /path/to/.ory-location.conf;

location /.ory/ {
  proxy_pass http://127.0.0.1:4433/;

  # Forward client information
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;

  # Forward cookies and Host header (required for Kratos session handling)
  proxy_set_header Cookie $http_cookie;
  proxy_set_header Host $http_host;

  # Allow backend to set cookies
  proxy_cookie_path / /.ory/;

  # Timeouts
  proxy_connect_timeout 60s;
  proxy_send_timeout 60s;
  proxy_read_timeout 60s;
}
