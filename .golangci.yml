version: "2"

run:
  timeout: 3m
  tests: true

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - revive
    - gosec
    - errorlint
    - bodyclose
    - misspell
    - goconst
    - unconvert
    - unparam
  settings:
    revive:
      rules:
        - name: var-naming
        - name: package-comments
          disabled: true
        - name: exported
          disabled: true
    gosec:
      excludes:
        - G104 # errcheck covers this
        - G706 # taint flow analysis — operator-controlled env, JSON-encoded logs
    errcheck:
      exclude-functions:
        - (net/http.ResponseWriter).Write
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - gosec
          - errcheck
          - goconst

formatters:
  enable:
    - gofmt
    - goimports
