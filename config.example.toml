# Jabali Panel — example configuration.
# Copy to /etc/jabali/config.toml and edit. Environment variables override
# anything set here (see panel-api/internal/config/config.go for the full
# list of env-var names).

# [server] is populated by install.sh on first install. It combines runtime
# listen settings and server identity (hostname, public IPs, nameservers).
# The panel reads these on first boot to seed the server_settings DB row;
# the DB is the source of truth afterwards (see docs/adr/0002).
#
# Example populated block:
#   [server]
#   addr        = "127.0.0.1:8443"   # listen address; nginx proxies PANEL_PORT → this
#   env         = "production"        # development | production
#   hostname    = "panel.example.com"
#   public_ipv4 = "203.0.113.10"
#   public_ipv6 = "2001:db8::10"
#   ns1_name    = "ns1.example.com"
#   ns1_ipv4    = "203.0.113.10"
#   ns2_name    = "ns2.example.com"
#   ns2_ipv4    = "203.0.113.11"
#
# Any of these can be overridden via env vars at startup
# (see panel-api/internal/config/config.go for the full mapping).

[log]
# debug | info | warn | error
level = "info"

# text | json. In production this is auto-upgraded to "json" unless you
# explicitly set LOG_FORMAT=text.
format = "text"

[database]
# MariaDB DSN. Unused in Phase 2; required in production from Phase 3.
# Example:
# url = "mysql://jabali_panel:CHANGE_ME@tcp(127.0.0.1:3306)/jabali_panel?parseTime=true&charset=utf8mb4&loc=UTC"
url = ""

[auth]
# Auth provider: "legacy" (JWT-only) or "kratos" (Ory Kratos identity platform).
# Default: "legacy". Set via env AUTH_PROVIDER.
provider = "legacy"

# 32+ random bytes (e.g. `openssl rand -hex 32`). Required in production.
# Never commit a real secret — set via env JWT_SECRET or a secrets manager.
jwt_secret = ""

# Short-lived access token lifetime.
access_ttl  = "15m"
refresh_ttl = "168h"  # 7 days

# Kratos (M20+) identity provider configuration.
# Only used when provider = "kratos".
[auth.kratos]
# Public URL of Kratos instance (reachable from browser + panel-api).
# Example: "https://auth.example.com" or "http://localhost:4433"
# Set via env KRATOS_PUBLIC_URL.
public_url = ""

# Admin URL of Kratos instance (reachable from panel-api only).
# Example: "https://auth.example.com" or "http://localhost:4434"
# Set via env KRATOS_ADMIN_URL.
admin_url = ""

[agent]
# Path to the jabali-agent Unix socket. The panel user (jabali group) needs
# read+write access to the socket file and traverse access to its parent dir.
socket_path = "/run/jabali/agent.sock"
# Per-call wall-clock ceiling. Short ops (agent.version) override this with
# their own tighter deadline; this is the default for commands that don't.
timeout     = "30s"

[cors]
# Origins allowed to hit the API from a browser. Empty = no CORS. Add your
# SPA host here when the frontend ships (Phase 8).
allowed_origins = []
