# WebSocket upgrade map for panel-api WS endpoints (logs streaming, etc.).
# Installed to /etc/nginx/conf.d/ by install_nginx_websocket_map() — must
# live in http{} scope so it's available to all server{} blocks that need
# to forward Upgrade/Connection headers.
#
# Usage in any vhost:
#   proxy_set_header Upgrade $http_upgrade;
#   proxy_set_header Connection $connection_upgrade;
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}
