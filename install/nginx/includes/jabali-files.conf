# -----------------------------------------------------------------
# FileBrowser (M11) — SSO-gated per-user file manager.
# Included from the default :443 server block.
#
# Access flow:
#   1. Panel user clicks "Files" → POST /api/v1/sso/filebrowser → redirect URL.
#   2. Browser GET /files/?token=<t> → nginx subrequest to /internal/fb-validate.
#   3. If subrequest 200, nginx injects X-Forwarded-User from the response
#      header and proxies to the filebrowser UDS. Inbound X-Forwarded-User
#      headers from the client are ALWAYS stripped, no exceptions.
#   4. Subsequent requests carry a filebrowser cookie; nginx still strips
#      inbound X-Forwarded-User on every request.
#
# Security invariants:
#   - Client-supplied X-Forwarded-User is ALWAYS stripped before proxy_pass.
#   - Token is one-time-use (panel enforces); replay fails.
# -----------------------------------------------------------------

# The one-shot bootstrap: consume the token and set X-Forwarded-User.
location = /files/ {
    if ($fb_token_empty = 1) {
        return 403;
    }

    auth_request /internal/fb-validate;
    auth_request_set $fb_user $upstream_http_x_auth_user;

    proxy_set_header X-Forwarded-User $fb_user;

    proxy_pass http://unix:/run/jabali-filebrowser/filebrowser.sock:/;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_http_version 1.1;
    proxy_set_header Connection "";

    # Allow the panel to embed /files/ in an iframe. Strip whatever
    # anti-framing headers filebrowser emits, since the token +
    # X-Forwarded-User already protect the session.
    proxy_hide_header X-Frame-Options;
    proxy_hide_header Content-Security-Policy;
}

# All subsequent paths under /files/ — filebrowser's own cookie keeps
# the session; nginx still strips inbound X-Forwarded-User on every
# request (we never trust the client with that header).
location /files/ {
    proxy_set_header X-Forwarded-User "";

    proxy_pass http://unix:/run/jabali-filebrowser/filebrowser.sock:/;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_http_version 1.1;
    proxy_set_header Connection "";

    # Filebrowser needs large uploads.
    client_max_body_size 4G;
    proxy_request_buffering off;

    # WebSocket support.
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    # See /files/ bootstrap block above.
    proxy_hide_header X-Frame-Options;
    proxy_hide_header Content-Security-Policy;
}

# Internal subrequest handler — NOT reachable externally.
location = /internal/fb-validate {
    internal;
    proxy_method POST;
    proxy_set_header Content-Type "application/json";
    proxy_set_body "{\"token\":\"$arg_token\"}";
    proxy_pass_request_body off;
    proxy_pass http://unix:/run/jabali-panel/sso.sock:/sso/filebrowser/validate;
}
