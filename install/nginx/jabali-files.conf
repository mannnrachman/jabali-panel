# -----------------------------------------------------------------
# FileBrowser (M11) — http-context helpers.
#
# The /files/ location blocks live in
#   install/nginx/includes/jabali-files.conf
# and are included from the default :443 server block. `location` is a
# server-context directive, so it cannot sit at the top level of
# /etc/nginx/conf.d/*. Maps (this file) DO belong in http-context.
# -----------------------------------------------------------------

# Resolves the effective SSO token for the /files/ session.
# Prefers the URL query token (bootstrap hit) and falls back to the
# session cookie (subsequent requests carry the cookie, not the URL).
# Empty string if neither is present — the location block then returns 401.
map $arg_token $fb_session_token_from_query {
    default $arg_token;
    ""      "";
}

map $fb_session_token_from_query $fb_session_token {
    default $fb_session_token_from_query;
    ""      $cookie_jabali_fb_session;
}
